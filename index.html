<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4f46e5">
<title>مصروفاتي 💳</title>
<script>
  // set theme before paint to avoid flash
  (function(){
    try {
      var t = localStorage.getItem('theme_v2');
      if (!t) t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    } catch(e) { document.documentElement.setAttribute('data-theme', 'light'); }
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">

  <div class="header">
    <h1>مصروفاتي 💳</h1>
    <div class="header-actions">
      <button class="icon-btn" id="theme-btn" onclick="toggleTheme()" title="تبديل الوضع" aria-label="تبديل الوضع">🌙</button>
      <a id="sheet-link" href="#" class="hlink" onclick="openSheet();return false">Sheets ↗</a>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('parse',this)">تحليل SMS</button>
    <button class="tab" onclick="switchTab('history',this)">السجل</button>
    <button class="tab" onclick="switchTab('finance',this)">التمويل</button>
    <button class="tab" onclick="switchTab('settings',this)">الإعدادات</button>
  </div>

  <!-- TAB: PARSE -->
  <div id="sec-parse">
    <div id="dashboard"></div>
    <div class="card">
      <div class="card-body">
        <div class="field">
          <label>الصق رسالة SMS البنكية</label>
          <textarea id="sms-input" placeholder="يدعم: الراجحي · الأهلي · SAB/الأول&#10;مثال: تم الشراء مبلغ SAR 105.24 لدى ALOTHAIM..."></textarea>
        </div>
        <button class="btn btn-primary" onclick="analyze()">🔍 تحليل الرسالة</button>
        <div id="result-area"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="card-title">إدخال يدوي</div>
        <div class="field-row">
          <div class="field">
            <label>التاريخ</label>
            <input type="date" id="m-date">
          </div>
          <div class="field">
            <label>المبلغ (ر.س)</label>
            <input type="number" id="m-amount" placeholder="0.00" step="0.01">
          </div>
        </div>
        <div class="field">
          <label>التاجر / الجهة</label>
          <input type="text" id="m-merchant" placeholder="مثال: كارفور">
        </div>
        <div class="field-row">
          <div class="field">
            <label>التصنيف</label>
            <select id="m-type">
              <option value="" disabled selected>— اختر التصنيف —</option>
              <option value="أساسيات">أساسيات</option>
              <option value="كماليات">كماليات</option>
              <option value="سداد التمويل">سداد التمويل</option>
              <option value="غير محدد">غير محدد</option>
            </select>
          </div>
          <div class="field">
            <label>طريقة الدفع</label>
            <input type="text" id="m-method" placeholder="مدى / Apple Pay">
          </div>
        </div>
        <div class="field">
          <label>ملاحظة (اختياري)</label>
          <input type="text" id="m-note" placeholder="مثال: قسمتها مع فلان">
        </div>
        <button class="btn btn-green" onclick="saveManual()">💾 حفظ</button>
        <div id="manual-status"></div>
      </div>
    </div>
  </div>

  <!-- TAB: HISTORY -->
  <div id="sec-history">
    <div class="hist-filters">
      <button class="filt-btn active" id="filt-all" onclick="filterHist('all',this)">الكل</button>
      <button class="filt-btn" id="filt-ess" onclick="filterHist('أساسيات',this)">أساسيات</button>
      <button class="filt-btn" id="filt-lux" onclick="filterHist('كماليات',this)">كماليات</button>
      <button class="filt-btn" id="filt-loan" onclick="filterHist('سداد التمويل',this)">سداد التمويل</button>
    </div>
    <div id="history-content"></div>
  </div>

  <!-- TAB: FINANCE -->
  <div id="sec-finance">
    <div id="finance-content"></div>
  </div>

  <!-- TAB: SETTINGS -->
  <div id="sec-settings">
    <div id="settings-content"></div>
  </div>

</div>

<script src="js/config.js"></script>
<script src="js/parsers.js"></script>
<script src="js/charts.js"></script>
<script src="js/save.js"></script>
<script src="js/render.js"></script>
<script src="js/app.js"></script>
</body>
</html>
