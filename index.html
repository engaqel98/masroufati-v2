<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4f46e5">
<title>مصروفاتي 💳</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="مصروفاتي">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<script>
  // set theme before paint to avoid flash
  (function(){
    try {
      var t = localStorage.getItem('theme_v2');
      if (!t) t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    } catch(e) { document.documentElement.setAttribute('data-theme', 'light'); }
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="priv">
<div class="container">

  <div class="header">
    <div class="brand">
      <div class="logo">💳</div>
      <div class="brand-txt"><h1>مصروفاتي</h1><p>متابعة المصاريف</p></div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="eye-btn" onclick="togglePrivacy()" title="إظهار/إخفاء الأرقام" aria-label="إظهار أو إخفاء الأرقام">👁️</button>
      <button class="icon-btn" id="settings-btn" onclick="switchTab('settings')" title="الإعدادات" aria-label="الإعدادات">⚙️</button>
    </div>
  </div>

  <!-- TAB: PARSE (home = dashboard) -->
  <div id="sec-parse">
    <div id="dashboard"></div>
  </div>

  <!-- TAB: HISTORY -->
  <div id="sec-history">
    <div class="page-title">السجل</div>
    <div class="hist-filters">
      <button class="filt-btn active" id="filt-all" onclick="filterHist('all',this)">الكل</button>
      <button class="filt-btn" id="filt-ess" onclick="filterHist('أساسيات',this)">أساسيات</button>
      <button class="filt-btn" id="filt-lux" onclick="filterHist('كماليات',this)">كماليات</button>
      <button class="filt-btn" id="filt-loan" onclick="filterHist('سداد التمويل',this)">سداد التمويل</button>
      <button class="filt-btn" id="filt-incoming" onclick="filterHist('incoming',this)">⬇️ وارد</button>
      <button class="filt-btn" id="filt-behalf" onclick="filterHist('behalf',this)">👥 نيابة</button>
      <button class="filt-btn" id="filt-gaps" onclick="filterHist('gaps',this)">🔎 فجوات الرصيد</button>
    </div>
    <div id="history-content"></div>
  </div>

  <!-- TAB: SETTINGS -->
  <div id="sec-settings">
    <div class="page-title">الإعدادات</div>
    <div id="settings-content"></div>
  </div>

</div>

<!-- Add/Analyze bottom sheet (opened by the + FAB) -->
<div class="backdrop" id="add-backdrop" onclick="closeAddSheet()"></div>
<div class="sheet" id="add-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">تحليل رسالة بنكية</div>
  <div class="sheet-desc">الصق رسالة الـ SMS ونستخرج العملية تلقائياً</div>
  <div class="field">
    <textarea id="sms-input" placeholder="يدعم: الراجحي · الأهلي · SAB/الأول&#10;مثال: تم الشراء مبلغ SAR 105.24 لدى ALOTHAIM..."></textarea>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="analyze()">🔍 تحليل</button>
    <button class="btn btn-outline" id="btn-paste" onclick="pasteAndAnalyze()">📋 لصق وتحليل</button>
    <button class="btn btn-green" id="btn-savetop" onclick="saveEntry()" style="display:none">💾 حفظ وإرسال</button>
  </div>
  <div id="result-area"></div>
  <details class="manual-details">
    <summary>➕ إدخال يدوي</summary>
    <div class="field-row">
      <div class="field"><label>التاريخ</label><input type="date" id="m-date"></div>
      <div class="field"><label>المبلغ (ر.س)</label><input type="number" id="m-amount" placeholder="0.00" step="0.01"></div>
    </div>
    <div class="field"><label>التاجر / الجهة</label><input type="text" id="m-merchant" placeholder="مثال: كارفور"></div>
    <div class="field-row">
      <div class="field"><label>التصنيف</label>
        <select id="m-type">
          <option value="" disabled selected>— اختر التصنيف —</option>
          <option value="أساسيات">أساسيات</option>
          <option value="كماليات">كماليات</option>
          <option value="سداد التمويل">سداد التمويل</option>
          <option value="غير محدد">غير محدد</option>
        </select>
      </div>
      <div class="field"><label>طريقة الدفع</label><input type="text" id="m-method" placeholder="مدى / Apple Pay"></div>
    </div>
    <div class="field"><label>ملاحظة (اختياري)</label><input type="text" id="m-note" placeholder="مثال: قسمتها مع فلان"></div>
    <div class="field"><label>👥 نيابة عن (اختياري)</label><input type="text" id="m-behalf" list="people-list" placeholder="اكتب اسم الشخص أو اختر من القائمة"></div>
    <button class="btn btn-green" onclick="saveManual()">💾 حفظ</button>
    <div id="manual-status"></div>
  </details>
</div>

<!-- Bottom navigation (Design 2) -->
<nav class="bottomnav"><div class="bottomnav-inner">
  <button class="navbtn active" data-tab="parse" onclick="switchTab('parse',this)" aria-label="الرئيسية">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg></button>
  <button class="navbtn fab" onclick="openAddSheet()" aria-label="تحليل رسالة">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
  <button class="navbtn" data-tab="history" onclick="switchTab('history',this)" aria-label="السجل">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h14v16l-3-2-2 2-2-2-2 2-2-2-3 2z"/><path d="M9 9h6M9 13h4"/></svg></button>
</div></nav>

<!-- قائمة اقتراحات الأسماء المشتركة لكل حقول "نيابة عن" — تُملأ من js/render.js -->
<datalist id="people-list"></datalist>

<!-- قائمة اقتراحات البطاقات/الحسابات — تُملأ من js/render.js -->
<datalist id="accounts-list"></datalist>

<!-- مُدخل ملف مخفي لاستعادة النسخة الاحتياطية -->
<input type="file" id="import-file" accept="application/json,.json" style="display:none" onchange="importBackupFile(this)">

<!-- Edit modal -->
<div id="edit-modal" class="modal-backdrop hidden" onclick="if(event.target===this)closeEdit()">
  <div class="modal-card">
    <div class="modal-title">✎ تعديل العملية</div>
    <div class="field"><label>التاجر</label><input type="text" id="e-merchant"></div>
    <div class="field-row">
      <div class="field"><label>المبلغ (ر.س)</label><input type="number" id="e-amount" step="0.01"></div>
      <div class="field"><label>التاريخ</label><input type="date" id="e-date"></div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>التصنيف</label>
        <select id="e-type">
          <option value="أساسيات">أساسيات</option>
          <option value="كماليات">كماليات</option>
          <option value="سداد التمويل">سداد التمويل</option>
          <option value="غير محدد">غير محدد</option>
          <option value="إضافة">إضافة (وارد)</option>
          <option value="استرداد">استرداد</option>
          <option value="حوالة واردة">حوالة واردة</option>
          <option value="راتب">راتب</option>
          <option value="سداد بطاقة">سداد بطاقة</option>
        </select>
      </div>
      <div class="field">
        <label>الاتجاه</label>
        <select id="e-direction">
          <option value="debit">خصم</option>
          <option value="credit">إضافة</option>
        </select>
      </div>
    </div>
    <div class="field"><label>ملاحظة</label><input type="text" id="e-note"></div>
    <div class="field"><label>👥 نيابة عن (اختياري)</label><input type="text" id="e-behalf" list="people-list"></div>
    <div id="edit-status"></div>
    <div class="btn-row" style="margin-top:14px">
      <button class="btn btn-green" onclick="saveEdit()">💾 حفظ التعديلات</button>
      <button class="btn btn-outline" onclick="closeEdit()">إلغاء</button>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/parsers.js"></script>
<script src="js/charts.js"></script>
<script src="js/save.js"></script>
<script src="js/render.js"></script>
<script src="js/i18n.js"></script>
<script src="js/app.js"></script>
<script>
  // تسجيل Service Worker لتشغيل التطبيق دون اتصال وتثبيته على الجوال
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('sw.js').catch(function(){});
    });
  }
</script>
</body>
</html>
